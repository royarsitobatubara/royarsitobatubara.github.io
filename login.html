<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>login</title>
    <style>
        *,html{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-image: url(hutan.jpg);
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            background-color: rgba(0,0,0,.3);
            backdrop-filter: blur(10px);
            height: 350px;
            width: 21rem;
            border-radius: 15px;
            box-shadow: 0 0 20px #eee;
            color: #eee;
        }
        form{
            padding: 10px 5%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        h2{
            color: #eee;
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
        }
        .input{
            padding:  0 10px;
            width: 100%;
            text-align: center;
            margin: 1rem 0;
            height: 40px;
            display: flex;
            align-items: center;
        }
        i{
            font-size: 50rem;

        }
        input{
            height: 40px;
            width: 100%;
            background-color: transparent;
            outline: none;
            color: #eee;
            padding: 0 10px;
            border: none;
        }
        a{
            background-color: black;
            text-decoration: none;
            font-size: 1.5rem;
            border-radius: 10px;
            padding: 10px 90px;
            color: #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <form action="">
            <h2>Login</h2>
            <div class="input">
                <i class="fa fa-user-o"></i>
                <input type="text" placeholder="Username" id="nama-input">
            </div>
            <div class="input">
                <i class="fa fa-lock"></i>
                <input type="text" placeholder="Password" inputmode="number">
                <i class="fa fa-eye"></i>
            </div>
            <div class="input">
                <i class="fa fa-envelope-o"></i>
                <input type="text" placeholder="email" inputmode="email">
            </div>
            <a href="index.html" id="submit">submit</a>
        </form>
    </div>
<script src="index.js"></script>
</body>
</html>
